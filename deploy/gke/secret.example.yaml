apiVersion: v1
kind: Secret
metadata:
  name: rag-pipeline-secrets
  namespace: rexi
  labels:
    app: rag-pipeline
type: Opaque
stringData:
  # AI Hub API key (sent as the `api-key` header to chat + embeddings).
  AI_HUB_API_KEY: "REPLACE_ME_AI_HUB_API_KEY"
  # Azure AD app client secret for the office365stanford tenant (RExI SharePoint).
  # Value lives in Secret Manager: project som-rit-phi-redcap-prod, secret SHAREPOINT_CLIENT_SECRET.
  SHAREPOINT_SITE_REXI_CLIENT_SECRET: "REPLACE_ME_SHAREPOINT_CLIENT_SECRET"

# ----------------------------------------------------------------------------
# DO NOT commit real values. Create the Secret out-of-band instead, e.g.:
#
#   kubectl -n rexi create secret generic rag-pipeline-secrets \
#     --from-literal=AI_HUB_API_KEY="$(<aihub_key)" \
#     --from-literal=SHAREPOINT_SITE_REXI_CLIENT_SECRET="$(gcloud secrets versions access latest \
#         --secret=SHAREPOINT_CLIENT_SECRET --project=som-rit-phi-redcap-prod)"
#
# Or, preferably, source both from the Secret Store CSI driver / Secret Manager
# (same pattern as the rexi-app `secret-provider` SecretProviderClass).
# ----------------------------------------------------------------------------
